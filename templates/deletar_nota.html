{% extends "base.html" %}
{% block title %}Excluir NF-{{ nota.pk }} | NFS-e Manager{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger text-white fw-semibold">Confirmar Exclusão</div>
      <div class="card-body p-4 text-center">
        <p>Tem certeza que deseja excluir a <strong>Nota Fiscal #{{ nota.pk }}</strong> de <strong>{{ nota.cliente.nome }}</strong>?</p>
        <form method="POST" class="d-flex gap-2 justify-content-center mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Sim, excluir</button>
          <a href="{% url 'detalhe_nota' nota.pk %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
